# Firebase App Hosting environment variables
# These are injected at build time by Firebase App Hosting.
# Docs: https://firebase.google.com/docs/app-hosting/configure#environment-variables

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: FB_API_KEY
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: FB_AUTH_DOMAIN
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: FB_PROJECT_ID
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: FB_STORAGE_BUCKET
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: FB_MESSAGING_SENDER_ID
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: FB_APP_ID
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    secret: FB_MEASUREMENT_ID
  - variable: NEXT_PUBLIC_FIREBASE_VAPID_KEY
    secret: FB_VAPID_KEY
